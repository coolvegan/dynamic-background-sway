background:
  # type: gradient
  # colors: ["#000000", "#222222"]
  type: image
  image_path: "/usr/share/backgrounds/wallpaper1.jpg"

renderer:
  # type: wayland  # or "egl" for hardware-accelerated OpenGL ES
  type: wayland

widgets:
  - type: clock
    position: { x: 20, y: 20 }
    size: { width: 200, height: 50 }
    interval: 1s
    style:
      font: "DejaVu Sans 16"
      color: "#ffffff"
      background: "rgba(0,0,0,0.0)"

  - type: cpu
    position: { x: 20, y: 80 }
    size: { width: 200, height: 50 }
    interval: 2s
    style:
      font: "DejaVu Sans 16"
      color: "#ffffff"
      background: "rgba(0,0,0,0.0)"

  - type: memory
    position: { x: 20, y: 140 }
    size: { width: 200, height: 50 }
    interval: 5s
    style:
      font: "DejaVu Sans 16"
      color: "#ffffff"
      background: "rgba(0,0,0,0.0)"

  - type: disk
    position: { x: 20, y: 200 }
    size: { width: 200, height: 50 }
    interval: 5s
    style:
      font: "DejaVu Sans 16"
      color: "#ffffff"
      background: "rgba(0,0,0,0.0)"

  - type: network
    position: { x: 20, y: 260 }
    size: { width: 200, height: 50 }
    interval: 5s
    style:
      font: "DejaVu Sans 16"
      color: "#ffffff"
      background: "rgba(0,0,0,0.0)"

api:
  enabled: true
  port: 8080
  websocket: true
