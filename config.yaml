background:
  type: image
  image_path: "/usr/share/backgrounds/wallpaper1.jpg"

renderer:
  # type: egl  # WIP - higher CPU than wayland (software render + GL upload)
  type: wayland  # SHM-based, most efficient for now

widgets:
  - type: clock
    position: { x: 20, y: 20 }
    size: { width: 200, height: 50 }
    interval: 1s
    style:
      font: "DejaVu Sans 16"
      color: "#ffffff"
      background: "rgba(0,0,0,0.0)"

  - type: cpu
    position: { x: 20, y: 80 }
    size: { width: 200, height: 50 }
    interval: 2s
    style:
      font: "DejaVu Sans 16"
      color: "#ffffff"
      background: "rgba(0,0,0,0.0)"

  - type: memory
    position: { x: 20, y: 140 }
    size: { width: 200, height: 50 }
    interval: 5s
    style:
      font: "DejaVu Sans 16"
      color: "#ffffff"
      background: "rgba(0,0,0,0.0)"

  - type: disk
    position: { x: 20, y: 200 }
    size: { width: 200, height: 50 }
    interval: 5s
    style:
      font: "DejaVu Sans 16"
      color: "#ffffff"
      background: "rgba(0,0,0,0.0)"

  - type: network
    position: { x: 20, y: 260 }
    size: { width: 200, height: 50 }
    interval: 5s
    style:
      font: "DejaVu Sans 16"
      color: "#ffffff"
      background: "rgba(0,0,0,0.0)"

api:
  enabled: true
  port: 8080
  websocket: true
